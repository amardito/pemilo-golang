services:
  db:
    image: postgres:16-alpine
    container_name: pemilo-db
    environment:
      POSTGRES_USER: pemilo
      POSTGRES_PASSWORD: pemilo_secret
      POSTGRES_DB: pemilo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pemilo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
